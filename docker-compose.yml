services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: project_game
      POSTGRES_USER: project_game
      POSTGRES_PASSWORD: project_game
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  session:
    build:
      context: .
      dockerfile: Dockerfile.session
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - .env
    depends_on:
      - session
    ports:
      - "3000:3000"

volumes:
  postgres-data:
